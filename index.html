<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inventario biblioteca</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="login-box">
        <form id="registerForm">
            <h2>CREAR CUENTA</h2>

            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Nombre de usuario" required>
                <label>Nombre de usuario</label>
            </div>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Correo electrónico" required>
                <label>Correo electrónico</label>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Contraseña" required>
                <label>Contraseña</label>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="confirmPassword" placeholder="Confirmar contraseña" required>
                <label>Confirmar contraseña</label>
            </div>

            <button type="submit" id="registerBtn" class="login-btn">Crear cuenta</button>
            <p class="message" id="registerMessage"></p>

            <p class="signup-link">
                ¿Ya tienes cuenta? <a href="#" id="showLogin">Iniciar sesión</a>
            </p>
        </form>

        <form id="loginForm" class="hidden">
            <h2>INICIAR SESIÓN</h2>

            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="loginEmail" placeholder="Correo electrónico" required>
                <label>Correo electrónico</label>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="Contraseña" required>
                <label>Contraseña</label>
            </div>

            <button type="submit" id="loginBtn" class="login-btn">Entrar</button>
            <p class="message" id="loginMessage"></p>

            <p class="signup-link">
                ¿No tienes cuenta? <a href="#" id="showRegister">Crear cuenta</a>
            </p>
        </form>

        <div class="session-header">
            <span id="welcomeText">Sesión iniciada</span>
            <button id="logoutBtn" class="logout-btn hidden" type="button">Cerrar sesión</button>
        </div>

        <div id="booksPanel" class="books-panel hidden">
            <h3>Gestión de libros</h3>
            <form id="bookForm" class="book-form">
                <input type="hidden" id="bookId">
                <div class="input-group">
                    <input type="text" id="bookTitle" placeholder="Título" required>
                    <label>Título</label>
                </div>
                <div class="input-group">
                    <input type="text" id="bookAuthor" placeholder="Autor" required>
                    <label>Autor</label>
                </div>
                <div class="input-group">
                    <input type="text" id="bookGenre" placeholder="Género">
                    <label>Género</label>
                </div>
                <div class="input-group">
                    <input type="date" id="bookDate" placeholder="Fecha de publicación">
                    <label>Fecha de publicación</label>
                </div>
                <div class="input-group">
                    <input type="number" id="bookQuantity" placeholder="Cantidad disponible" min="0" value="0">
                    <label>Cantidad disponible</label>
                </div>
                <button type="submit" id="bookSubmitBtn" class="login-btn">Agregar libro</button>
                <button type="button" id="cancelEditBtn" class="logout-btn hidden">Cancelar edición</button>
                <p class="message" id="bookMessage"></p>
            </form>
            <div class="books-list">
                <h4>Libros registrados</h4>
                <table id="booksTable" class="books-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Título</th>
                            <th>Autor</th>
                            <th>Género</th>
                            <th>Fecha publicación</th>
                            <th>Cantidad</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="scroll-sidebar">
        <button id="scrollUp" aria-label="Subir">
            <i class="fas fa-chevron-up"></i>
        </button>
        <button id="scrollDown" aria-label="Bajar">
            <i class="fas fa-chevron-down"></i>
        </button>
    </div>
    <script src="script.js"></script>
</body>
